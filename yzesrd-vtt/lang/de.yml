"YZSRD.VEHICLE.Action.Crash": Absturz
"YZSRD.VEHICLE.Action.CrashHint": >-
  Wenn ein Spinner zerstört wurde, stürzt er auf den Boden. Alle Insassen
  erleiden W3 Punkte Fallschaden plus einen für jede Höhen-Zone, gemildert durch
  die Panzerung des Fahrzeugs und einen BEWEGLICHKEIT-Wurf (keine Aktion): Jeder
  Erfolg senkt den Schaden um 1.
"YZSRD.VEHICLE.Action.CrashDialog": >-
  Das Fahrzeug stürzt ab und verursacht bei allen Insassen {damage} Fallschaden,
  abgemildert durch die Panzerung des Fahrzeugs und einen BEWEGLICHKEIT-Wurf
  (keine Aktion): Jeder Erfolg senkt den Schaden um 1.
"YZSRD.VEHICLE.Action.Explode": Explosion
"YZSRD.VEHICLE.Action.ExplodeHint": >-
  Das Fahrzeug explodiert in einem Feuerball. Alle Insassen erleiden Schaden in
  Höhe einer Sprengkraft B Explosion. Das Fahrzeug ist irreparabel zerstört.
"YZSRD.VEHICLE.Action.MassiveCrash": Schwerer Aufprall
"YZSRD.VEHICLE.Action.Ramming": Rammen
"YZSRD.VEHICLE.Action.RammingHint": >-
  Die meisten Fahrzeuge können als Waffen genutzt werden - bspw. indem man das
  Ziel überfährt. Dies zählt als NAHKAMPF Angriff, der mit einem Wurf auf FAHREN
  durchgeführt wird. Der Wurf kann mit einer Beschleunigungs-Aktion kombiniert
  werden, in diesem Fall ist der FAHREN-Wurf ein vergleichender Wurf, was die
  Effektivität der Beschleunigung einschränken kann. Der Basis-Schaden der
  Attacke entspricht dem HÜLLEN-Wert des Fahrzeugs geteilt durch 2 (abgerundet).
  Ramm-Angriffe verursachen Stumpfen Schaden mit einem KRIT-Würfel der dem
  HÜLLEN-Wert des Fahrzeugs entspricht (aufgerundet).
"YZSRD.VEHICLE.Action.Repair": Reparieren
"YZSRD.VEHICLE.Action.RepairHint": >-
  Reparaturen von Fahrzeugschaden benötigen ein oder mehrere Würfe auf
  TECHNOLOGIE. Pro SCHICHT kann ein Wurf ablegegt werden. Nur eien Person kann
  auf Hüllen-Reparaturen würfeln, aber weitere können helfen. Jedes gewürfelte
  <span class="blade-runner-symbols">S</span> reduziert den Schaden um 1. Ein
  Fahrzeug gilt nicht mehr als zerstört, wenn es 1 Schadenspunkt repairet wurde.
  Wenn der Motor oder eine Fahrzeugwaffe durch einen kritischen Treffer
  ausgefallen ist, so müssen diese normalerweise mit einem zusätzlichen Wurf auf
  TECNHNOLOGIE repariert werden. Auch dieser Wurf dauert eine SCHICHT.
"YZSRD.VEHICLE.Action.Speeding": Beschleunigen
"YZSRD.VEHICLE.Action.SpeedingHint": >-
  Ähnlich wie bei einem Sprint zu Fuß kannst du über die Beschleunigungs-Aktion
  für ein Fahrzeug zusätzliche Manöver-Aktionen in einer Runde erhalten.
